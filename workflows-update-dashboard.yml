name: Update Dashboard Every 6 Hours

on:
  schedule:
    - cron: '0 */6 * * *' # רץ כל 6 שעות
  workflow_dispatch:      # מאפשר לך להריץ ידנית לבדיקה

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # חובה! זה מה שפותר את שגיאה 128 באופן סופי
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt || pip install requests feedparser

      - name: Run news fetcher
        run: python fetch_news.py

      - name: Commit and Push changes
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          # הפקודה הבאה תבצע קומיט רק אם יש שינויים (כדי למנוע שגיאות ריקות)
          git diff --quiet && git diff --staged --quiet || (git commit -m '🔄 Update dashboard' && git push)
