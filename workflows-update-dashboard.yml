name: Update Dashboard

on:
  schedule:
    - cron: '*/32 * * * *' # רץ כל 32 דקות
  workflow_dispatch:      # מאפשר הרצה ידנית

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # חובה כדי לשמור את הקובץ
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run news fetcher
        run: python fetch_news.py

      - name: Force Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add index.html
          git commit -m "🚀 Force update dashboard" || echo "No changes to commit"
          git push origin main
