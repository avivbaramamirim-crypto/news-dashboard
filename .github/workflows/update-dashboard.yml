name: Update Dashboard Every 6 Hours

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    # השורות הבאות הן הקריטיות לתיקון!
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4 # עדכון לגרסה יציבה יותר
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies and run
        run: |
          pip install -r requirements.txt
          python fetch_news.py
      
      - name: Commit and Push changes
        run: |
          git config --global user.email 'action@github.com'
          git config --global user.name 'GitHub Action'
          git add .
          # ביצוע קומיט רק אם יש שינויים בקבצים
          git diff --quiet && git diff --staged --quiet || (git commit -m '🔄 Update dashboard' && git push)
